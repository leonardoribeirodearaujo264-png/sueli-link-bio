<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000">
  <meta name="description" content="Dra. Sueli Dias — Advogada. Direito do Trabalho, Família e Previdenciário.">
  <title>Dra. Sueli Dias | Advogada</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      background: #0b0b0b;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100svh;
      width: 100%;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    img { display: block; max-width: 100%; height: auto; }
    a   { text-decoration: none; color: inherit; }

    :root {
      --gold:    #d4af37;
      --gold-lt: #f0d278;
      --bg:      #0b0b0b;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(.84); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes ringGlow {
      0%,100% { box-shadow: 0 0 0 3px rgba(212,175,55,.10), 0 8px 40px rgba(0,0,0,.7); }
      50%      { box-shadow: 0 0 0 5px rgba(212,175,55,.22), 0 8px 40px rgba(0,0,0,.7); }
    }

    .page {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      background: var(--bg);
      overflow-x: hidden;
    }

    .hero {
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%,
          rgba(212,175,55,.12) 0%,
          rgba(212,175,55,.04) 50%,
          transparent 100%),
        var(--bg);
      padding: 48px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      width: 100%;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg,
        transparent,
        rgba(212,175,55,.85) 50%,
        transparent);
      pointer-events: none;
    }

    .profile-ring {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: conic-gradient(
        #d4af37 0deg, #f0d278 90deg,
        #9a7030 180deg, #d4af37 270deg, #f0d278 360deg
      );
      padding: 3px;
      margin-bottom: 20px;
      animation: scaleIn .6s cubic-bezier(.34,1.56,.64,1) both,
                 ringGlow 3.5s 1s ease-in-out infinite;
      cursor: default;
    }

    .profile-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #0d0e18;
      overflow: hidden;
      border: 2px solid #0b0b0b;
    }

    .profile-pic {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    .hero-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 38px;
      font-weight: 700;
      letter-spacing: -.012em;
      line-height: 1.05;
      color: #fff;
      margin-bottom: 9px;
      animation: fadeUp .5s .12s ease both;
    }

    .hero-sub {
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
      animation: fadeUp .5s .18s ease both;
    }

    .hero-icons {
      display: flex;
      gap: 18px;
      align-items: center;
      justify-content: center;
      animation: fadeUp .5s .25s ease both;
    }

    .ic {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(212,175,55,.55);
      background: rgba(10,11,22,.80);
      box-shadow: 0 0 0 1px rgba(212,175,55,.08),
                  inset 0 1px 0 rgba(255,255,255,.06);
      display: flex;
      align-items: center;
      justify-content: center;
      transition:
        transform .22s cubic-bezier(.34,1.56,.64,1),
        border-color .22s,
        background .22s,
        box-shadow .22s;
      -webkit-tap-highlight-color: transparent;
    }
    .ic:hover {
      transform: scale(1.16);
      border-color: rgba(212,175,55,.90);
      background: rgba(212,175,55,.13);
      box-shadow: 0 0 0 4px rgba(212,175,55,.16),
                  0 6px 22px rgba(0,0,0,.55);
    }
    .ic:active { transform: scale(1.05); }

    .ic svg {
      width: 22px;
      height: 22px;
      fill: rgba(240,210,120,.90);
      flex-shrink: 0;
      transition: fill .2s;
    }
    .ic:hover svg { fill: var(--gold-lt); }

    .sep {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      margin: 6px 0 18px;
    }
    .sep::before, .sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(212,175,55,.14);
    }
    .sep span {
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: rgba(212,175,55,.32);
    }

    .banners {
      padding: 0 20px 44px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      overflow-x: clip;
      background:
        radial-gradient(ellipse 90% 70% at 50% 45%,
          rgba(212,175,55,.07) 0%,
          transparent 68%),
        var(--bg);
    }

    .banner-card {
      display: block;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      border-radius: 12px;
      overflow: hidden;
      border: 2.4px solid rgb(46,46,46);
      box-shadow: 0 10px 25px rgba(212,175,55,.15);
      transition: opacity 0.9s ease, transform 0.9s ease,
                  border-color .3s, box-shadow .3s;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      opacity: 0;
      transform: translateX(-80px);
    }

    .banner-card.show {
      opacity: 1;
      transform: translateX(0);
    }

    .banner-card:not(.show):nth-child(1) { transition-delay: 0.2s; }
    .banner-card:not(.show):nth-child(2) { transition-delay: 0.4s; }
    .banner-card:not(.show):nth-child(3) { transition-delay: 0.6s; }
    .banner-card:not(.show):nth-child(4) { transition-delay: 0.8s; }

    .banner-card:hover {
      border-color: rgba(212,175,55,.70);
      transform: translateY(-2px);
      box-shadow: 0 0 38px rgba(212,175,55,.30),
                  0 8px 32px rgba(0,0,0,.65);
    }
    .banner-card.show:hover {
      transform: translateY(-2px);
    }
    .banner-card:active { transform: scale(.99); }

    .banner-card img {
      width: 100%;
      height: auto;
      display: block;
      max-width: 100%;
      min-height: 1px;
    }

    .footer {
      text-align: center;
      padding: 16px 20px 48px;
      border-top: 1px solid rgba(212,175,55,.10);
      background: var(--bg);
    }
    .footer-logo {
      height: 20px;
      width: auto;
      margin: 0 auto 10px;
      opacity: .22;
      filter: brightness(0) invert(1);
    }
    .footer-copy {
      font-size: 9px;
      color: rgba(255,255,255,.16);
      letter-spacing: .07em;
      line-height: 1.9;
    }
    .footer-links {
      margin-top: 8px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .footer-links a {
      font-size: 9px;
      color: rgba(212,175,55,.28);
      letter-spacing: .06em;
      text-transform: uppercase;
      transition: color .2s;
    }
    .footer-links a:hover { color: var(--gold); }

    @media (max-width: 390px) {
      .hero         { padding: 36px 16px 32px; }
      .profile-ring { width: 96px; height: 96px; }
      .hero-name    { font-size: 30px; }
      .ic           { width: 46px; height: 46px; }
      .ic svg       { width: 19px; height: 19px; }
      .hero-icons   { gap: 12px; }
      .banners      { padding: 0 14px 36px; gap: 11px; }
    }

    @media (min-width: 480px) {
      .profile-ring { width: 124px; height: 124px; }
      .hero-name    { font-size: 44px; }
      .ic           { width: 58px; height: 58px; }
      .ic svg       { width: 25px; height: 25px; }
      .hero-icons   { gap: 20px; }
    }
  </style>
</head>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    var cards = document.querySelectorAll(".banner-card");
    cards.forEach(function (card, index) {
      var delay = 200 + index * 200;
      setTimeout(function () {
        card.classList.add("show");
        setTimeout(function () {
          card.style.transitionDelay = "0s";
        }, 950);
      }, delay);
    });
  });
